<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر زينة | الإشعاع الذهبي</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Amiri:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700; /* ذهبي مشع وصريح */
            --dark-gold: #B8860B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* خلفية مسرحية حالكة السواد مع هالة خفيفة جداً في المنتصف */
            background-color: #000000;
            background: radial-gradient(circle at center, #110d00 0%, #000000 60%);
            color: #fff;
            font-family: 'Amiri', serif;
            overflow: hidden;
            touch-action: none;
        }

        /* لوحة الرسم الفيزيائية مع تأثير الإشعاع الخارجي */
        #particle-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            /* سر الاحتراف: فلتر إشعاع يعتمد على كرت الشاشة لتوهج خيالي */
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.4)) drop-shadow(0 0 45px rgba(215, 175, 0, 0.2));
        }

        /* واجهة المستخدم */
        .ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 50px 20px;
            pointer-events: none;
        }

        .header {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            letter-spacing: 8px;
            color: rgba(255, 215, 0, 0.7);
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .footer-action {
            pointer-events: auto;
            text-align: center;
            margin-bottom: 30px;
        }

        .enter-btn {
            display: inline-block;
            padding: 18px 50px;
            background: rgba(0, 0, 0, 0.5);
            color: var(--gold);
            border: 1px solid rgba(255, 215, 0, 0.5);
            border-radius: 40px;
            font-size: 20px;
            text-decoration: none;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
        }

        .enter-btn:hover {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
            transform: translateY(-3px);
        }

        .enter-btn:active {
            transform: scale(0.95);
        }

        .hint {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
            letter-spacing: 3px;
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="ui-layer">
        <div class="header">La Collection Royale</div>
        
        <div class="footer-action">
            <a href="#" class="enter-btn">اكتشف العظمة</a>
            <div class="hint">المس الذهب لتحريكه</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        let mouse = { x: null, y: null, radius: 120 }; // زيادة قطر تأثير اللمس

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        window.addEventListener('touchmove', function(event) {
            mouse.x = event.touches[0].clientX;
            mouse.y = event.touches[0].clientY;
        });

        window.addEventListener('mouseout', function() { mouse.x = undefined; mouse.y = undefined; });
        window.addEventListener('touchend', function() { mouse.x = undefined; mouse.y = undefined; });

        function drawText() {
            ctx.fillStyle = 'white';
            // التكبير الهائل للاسم ليملأ الشاشة ويسيطر عليها
            let fontSize = canvas.width < 600 ? 110 : 280; 
            ctx.font = `900 ${fontSize}px 'Playfair Display', serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            // رفع النص قليلاً ليتوسط الشاشة البصرية بشكل أفضل
            ctx.fillText('ZEINA', canvas.width / 2, canvas.height / 2.3);
        }

        drawText();
        let textCoordinates = ctx.getImageData(0, 0, canvas.width, canvas.height);

        class Particle {
            constructor(x, y) {
                this.x = x + Math.random() * 30 - 15;
                this.y = y + Math.random() * 30 - 15;
                this.size = Math.random() * 2.5 + 0.5;
                this.baseX = x;
                this.baseY = y;
                this.density = (Math.random() * 40) + 5;
                
                // درجات ذهبية متوهجة وعشوائية لزيادة الواقعية
                let opacity = Math.random() * 0.7 + 0.3;
                let isBright = Math.random() > 0.8;
                this.color = isBright ? `rgba(255, 245, 180, ${opacity})` : `rgba(255, 215, 0, ${opacity})`;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                let maxDistance = mouse.radius;
                let force = (maxDistance - distance) / maxDistance;
                let directionX = forceDirectionX * force * this.density;
                let directionY = forceDirectionY * force * this.density;

                if (distance < mouse.radius) {
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    if (this.x !== this.baseX) {
                        let dx = this.x - this.baseX;
                        this.x -= dx / 12; // عودة أبطأ وأكثر نعومة
                    }
                    if (this.y !== this.baseY) {
                        let dy = this.y - this.baseY;
                        this.y -= dy / 12;
                    }
                }
            }
        }

        function init() {
            particlesArray = [];
            // دقة أعلى (3 بدلاً من 4) لزيادة كثافة الذرات وبريقها
            for (let y = 0, y2 = textCoordinates.height; y < y2; y += 3) {
                for (let x = 0, x2 = textCoordinates.width; x < x2; x += 3) {
                    if (textCoordinates.data[(y * 4 * textCoordinates.width) + (x * 4) + 3] > 128) {
                        let positionX = x;
                        let positionY = y;
                        particlesArray.push(new Particle(positionX, positionY));
                    }
                }
            }
        }

        init();

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // سر الاحتراف: يجعل الذرات المتداخلة تشع بقوة كالضوء الحقيقي
            ctx.globalCompositeOperation = 'screen'; 
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].draw();
                particlesArray[i].update();
            }
            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawText();
            textCoordinates = ctx.getImageData(0, 0, canvas.width, canvas.height);
            init();
        });
    </script>
</body>
</html>
