<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر زينة | الاحتراف المطلق</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Amiri:wght@400;700&family=Cairo:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --dark-bg: #030407;
            --theme-color: #FFD700; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--dark-bg); color: #fff;
            font-family: 'Amiri', serif; overflow: hidden; touch-action: none;
            height: 100vh; width: 100vw;
        }

        /* =========================================
           شاشة الافتتاح
           ========================================= */
        #intro-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 100;
            background: radial-gradient(circle at center, #10141e 0%, #030407 100%);
            transition: opacity 2s cubic-bezier(0.8, 0, 0.2, 1);
        }

        #static-text-container {
            position: absolute; top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 5;
            width: 100%;
            transition: opacity 0.1s; 
        }

        .crisp-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(90px, 20vw, 250px);
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
            margin: 0;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.6), 0 0 60px rgba(255, 255, 255, 0.2);
        }

        .crisp-subtitle {
            font-family: 'Cairo', sans-serif;
            font-size: clamp(35px, 8vw, 80px);
            font-weight: 900;
            color: var(--gold);
            margin-top: -10px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        #particle-canvas { 
            display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; 
            opacity: 0; 
        }

        #flash {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #fff; z-index: 101; opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease-out; 
        }

        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            padding: 60px 20px 40px; transition: opacity 0.5s ease;
        }

        .header-intro {
            font-family: 'Playfair Display', serif; font-size: 14px; letter-spacing: 12px;
            color: rgba(255, 255, 255, 0.8); text-transform: uppercase;
        }

        /* تنسيقات منطقة الزر والعداد */
        .footer-action {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .countdown-timer {
            font-family: 'Cairo', sans-serif;
            font-size: 55px;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 0 0 40px rgba(255, 215, 0, 0.4);
            height: 60px; /* لتثبيت الارتفاع ومنع اهتزاز الزر */
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease;
        }

        /* تأثير الانبثاق السينمائي للأرقام */
        .pop-effect {
            animation: cinematicPop 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
