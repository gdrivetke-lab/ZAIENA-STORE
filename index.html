<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر زينة | سحر منتصف الليل</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Amiri:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #E5C158; /* ذهبي ناعم ومريح للعين */
            --dark-bg: #020305;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            /* خلفية مريحة جداً للعين: تدرج من أزرق ليلي عميق إلى أسود ناعم */
            background-color: var(--dark-bg);
            background: radial-gradient(circle at center, #121826 0%, #020305 80%);
            color: #fff;
            font-family: 'Amiri', serif;
            overflow: hidden;
            touch-action: none;
            height: 100vh;
            width: 100vw;
        }

        /* لوحة الذرات مع إشعاع ناعم غير مزعج */
        #particle-canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            /* فلتر إشعاع محسّن ليكون ناعماً على العين */
            filter: drop-shadow(0 0 10px rgba(229, 193, 88, 0.2));
        }

        /* واجهة المستخدم */
        .ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 20px;
            pointer-events: none;
        }

        .header {
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            letter-spacing: 10px;
            color: rgba(229, 193, 88, 0.8);
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }

        .footer-action {
            pointer-events: auto;
            text-align: center;
            margin-bottom: 20px;
        }

        .enter-btn {
            display: inline-block;
            padding: 16px 45px;
            background: rgba(18, 24, 38, 0.6);
            color: var(--gold);
            border: 1px solid rgba(229, 193, 88, 0.4);
            border-radius: 40px;
            font-size: 18px;
            text-decoration: none;
            transition: all 0.4s ease;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .enter-btn:hover {
            background: var(--gold);
            color: var(--dark-bg);
            border-color: var(--gold);
            transform: translateY(-2px);
        }

        .enter-btn:active {
            transform: scale(0.96);
        }

        .hint {
            margin-top: 25px;
            font-size: 13px;
            color: #8c93a1;
            letter-spacing: 2px;
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="ui-layer">
        <div class="header">Luxury Redefined</div>
        
        <div class="footer-action">
            <a href="#" class="enter-btn">ابدأ الرحلة الفاخرة</a>
            <div class="hint">مرر إصبعك لتنثر الذهب</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        let mouse = { x: null, y: null, radius: 130 }; 

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        window.addEventListener('touchmove', function(event) {
            mouse.x = event.touches[0].clientX;
            mouse.y = event.touches[0].clientY;
        });

        window.addEventListener('mouseout', function() { mouse.x = undefined; mouse.y = undefined; });
        window.addEventListener('touchend', function() { mouse.x = undefined; mouse.y = undefined; });

        function drawText() {
            ctx.fillStyle = 'white';
            // تكبير الاسم بشكل يتناسب مع جميع الشاشات ليكون واضحاً ومهيمناً
            let fontSize = canvas.width < 600 ? 120 : 300; 
            ctx.font = `900 ${fontSize}px 'Playfair Display', serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('ZEINA', canvas.width / 2, canvas.height / 2.3);
        }

        drawText();
        let textCoordinates = ctx.getImageData(0, 0, canvas.width, canvas.height);

        class Particle {
            constructor(x, y) {
                this.x = x + Math.random() * 20 - 10;
                this.y = y + Math.random() * 20 - 10;
                this.size = Math.random() * 2.5 + 0.8; // ذرات بحجم مريح
                this.baseX = x;
                this.baseY = y;
                this.density = (Math.random() * 35) + 5;
                
                // ألوان ذهبية دافئة وهادئة مريحة جداً للعين
                let opacity = Math.random() * 0.6 + 0.4;
                let colorVariant = Math.random();
                if (colorVariant > 0.8) {
                    this.color = `rgba(255, 235, 160, ${opacity})`; // ذهبي فاتح
                } else if (colorVariant > 0.4) {
                    this.color = `rgba(229, 193, 88, ${opacity})`; // ذهبي كلاسيكي
                } else {
                    this.color = `rgba(196, 154, 52, ${opacity})`; // ذهبي داكن عميق
                }
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                let maxDistance = mouse.radius;
                let force = (maxDistance - distance) / maxDistance;
                let directionX = forceDirectionX * force * this.density;
                let directionY = forceDirectionY * force * this.density;

                if (distance < mouse.radius) {
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    if (this.x !== this.baseX) {
                        let dx = this.x - this.baseX;
                        this.x -= dx / 15; // حركة عودة ناعمة جداً
                    }
                    if (this.y !== this.baseY) {
                        let dy = this.y - this.baseY;
                        this.y -= dy / 15;
                    }
                }
            }
        }

        function init() {
            particlesArray = [];
            // تحسين كثافة الذرات لتشكيل الاسم بوضوح أكبر
            for (let y = 0, y2 = textCoordinates.height; y < y2; y += 3) {
                for (let x = 0, x2 = textCoordinates.width; x < x2; x += 3) {
                    if (textCoordinates.data[(y * 4 * textCoordinates.width) + (x * 4) + 3] > 128) {
                        let positionX = x;
                        let positionY = y;
                        particlesArray.push(new Particle(positionX, positionY));
                    }
                }
            }
        }

        init();

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // إضافة خاصية الدمج اللوني اللطيف (Lighter) بدلاً من (Screen) لتخفيف السطوع المزعج
            ctx.globalCompositeOperation = 'lighter'; 
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].draw();
                particlesArray[i].update();
            }
            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawText();
            textCoordinates = ctx.getImageData(0, 0, canvas.width, canvas.height);
            init();
        });
    </script>
</body>
</html>
