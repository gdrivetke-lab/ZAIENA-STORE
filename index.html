<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر زينة | تفاعل الذرات الذهبية</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Amiri:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #030305;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark);
            color: #fff;
            font-family: 'Amiri', serif;
            overflow: hidden; /* نمنع التمرير لأنها شاشة تفاعلية */
            touch-action: none; /* لمنع حركات المتصفح الافتراضية عند اللمس */
        }

        /* لوحة الرسم الفيزيائية */
        #particle-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* واجهة المستخدم (تطفو فوق الذرات) */
        .ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            pointer-events: none; /* حتى يمرر اللمس للوحة الخلفية */
        }

        .header {
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            letter-spacing: 6px;
            color: rgba(212, 175, 55, 0.6);
            text-transform: uppercase;
        }

        .footer-action {
            pointer-events: auto; /* تفعيل اللمس للزر فقط */
            text-align: center;
        }

        .enter-btn {
            display: inline-block;
            padding: 15px 40px;
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            border-radius: 30px;
            font-size: 18px;
            text-decoration: none;
            transition: all 0.4s ease;
            backdrop-filter: blur(5px);
        }

        .enter-btn:active {
            background: var(--gold);
            color: var(--dark);
            transform: scale(0.95);
        }

        .hint {
            margin-top: 15px;
            font-size: 12px;
            color: #888;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- الشاشة القماشية التي سيرسم عليها الجافاسكربت ملايين الذرات -->
    <canvas id="particle-canvas"></canvas>

    <!-- الواجهة الأمامية -->
    <div class="ui-layer">
        <div class="header">Exclusive Collections</div>
        
        <div class="footer-action">
            <a href="#" class="enter-btn">ادخل إلى عالم زينة</a>
            <div class="hint">المس الشاشة لتحريك ذرات الذهب</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        let mouse = { x: null, y: null, radius: 100 };

        // التفاعل مع الماوس واللمس (للهواتف)
        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        window.addEventListener('touchmove', function(event) {
            mouse.x = event.touches[0].clientX;
            mouse.y = event.touches[0].clientY;
        });

        window.addEventListener('mouseout', function() {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        window.addEventListener('touchend', function() {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        // رسم النص وسحب إحداثيات البيكسلات لإنشاء الذرات
        ctx.fillStyle = 'white';
        // تعديل حجم الخط ليتناسب مع شاشات الجوال والكمبيوتر
        let fontSize = canvas.width < 600 ? 60 : 150; 
        ctx.font = `bold ${fontSize}px 'Playfair Display', serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('ZEINA', canvas.width / 2, canvas.height / 2.2);

        const textCoordinates = ctx.getImageData(0, 0, canvas.width, canvas.height);

        class Particle {
            constructor(x, y) {
                this.x = x + Math.random() * 20 - 10;
                this.y = y + Math.random() * 20 - 10;
                this.size = Math.random() * 2 + 0.5;
                this.baseX = x;
                this.baseY = y;
                // كثافة مختلفة لكل ذرة لتعطي سرعة تناثر مختلفة
                this.density = (Math.random() * 30) + 5; 
                // لون ذهبي بدرجات عشوائية خفيفة
                let opacity = Math.random() * 0.5 + 0.5;
                this.color = `rgba(212, 175, 55, ${opacity})`;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            update() {
                // حساب المسافة بين لمسة المستخدم والذرة
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                // قوة الدفع والجاذبية
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                let maxDistance = mouse.radius;
                let force = (maxDistance - distance) / maxDistance;
                let directionX = forceDirectionX * force * this.density;
                let directionY = forceDirectionY * force * this.density;

                // إذا كان المستخدم يلمس قريباً من الذرة، تتطاير
                if (distance < mouse.radius) {
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    // إذا ابتعد المستخدم، تعود الذرة لمكانها الأصلي كالمغناطيس
                    if (this.x !== this.baseX) {
                        let dx = this.x - this.baseX;
                        this.x -= dx / 10;
                    }
                    if (this.y !== this.baseY) {
                        let dy = this.y - this.baseY;
                        this.y -= dy / 10;
                    }
                }
            }
        }

        function init() {
            particlesArray = [];
            // فحص كل بيكسل، إذا كان غير شفاف، ننشئ مكانه ذرة
            for (let y = 0, y2 = textCoordinates.height; y < y2; y += 4) {
                for (let x = 0, x2 = textCoordinates.width; x < x2; x += 4) {
                    if (textCoordinates.data[(y * 4 * textCoordinates.width) + (x * 4) + 3] > 128) {
                        let positionX = x;
                        let positionY = y;
                        particlesArray.push(new Particle(positionX, positionY));
                    }
                }
            }
        }

        init();

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].draw();
                particlesArray[i].update();
            }
            requestAnimationFrame(animate);
        }

        animate();

        // إعادة تشكيل الذرات عند تغيير حجم الشاشة أو تدوير الجوال
        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.fillStyle = 'white';
            fontSize = canvas.width < 600 ? 60 : 150; 
            ctx.font = `bold ${fontSize}px 'Playfair Display', serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('ZEINA', canvas.width / 2, canvas.height / 2.2);
            textCoordinates = ctx.getImageData(0, 0, canvas.width, canvas.height);
            init();
        });
    </script>
</body>
</html>
